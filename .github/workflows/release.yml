name: Release

on:
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    name: build-release
    steps:
      - name: Checkout Repos
        uses: actions/checkout@v4

      - name: Bun setup
        uses: oven-sh/setup-bun@v2

      - name: jq setup
        uses: sergeysova/jq-action@v2

      - name: get version
        id: get-version
        run: |
          echo "version=$(cat manifest.json | jq -r .version)" >> $GITHUB_OUTPUT

      - name: Build
        run: |
          bun install
          bun run ./build.ts

      - name: Making zip
        run: |
          zip obsidian-asking-chatgpt.zip main.js manifest.json

      - name: create github tag
        uses: rickstaa/action-create-tag@v1
        id: tag_create
        with:
          tag: ${{ steps.get-version.outputs.version }}
          tag_exists_error: false
          message: "version: ${{ steps.get-version.outputs.version }}"

      - name: Upload binaries to release
        uses: svenstaro/upload-release-action@v2
        with:
            repo_token: ${{ secrets.GITHUB_TOKEN }}
            file: obsidian-asking-chatgpt.zip
            asset_name: obsidian-asking-chatgpt.zip
            tag: ${{ steps.get-version.outputs.version }}
            overwrite: true
